    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; -webkit-font-smoothing: antialiased; }
        #password-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f7f7f5;
        }
        #password-gate.hidden { display: none; }
        #root.hidden { display: none; }
        .gate-form {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .gate-form h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
        .gate-form p { color: #666; margin-bottom: 24px; }
        .gate-form input {
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 200px;
            margin-right: 8px;
        }
        .gate-form button {
            padding: 12px 24px;
            font-size: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .gate-form button:hover { background: #1d4ed8; }
        .gate-error { color: #dc2626; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div id="password-gate">
        <div class="gate-form">
            <h1>Imaging Dashboard</h1>
            <p>Enter password to continue</p>
            <form id="gate-form" onsubmit="return checkPassword(event)">
                <input type="password" id="gate-password" placeholder="Password" autofocus>
                <button type="submit">Enter</button>
            </form>
            <p class="gate-error" id="gate-error">Incorrect password</p>
        </div>
    </div>
    <div id="root" class="hidden"></div>
    <script>
        const STORAGE_KEY = 'imaging-dashboard-auth';
        const PASSWORD = 'stanford';

        function checkPassword(e) {
            e.preventDefault();
            const input = document.getElementById('gate-password').value;
            if (input === PASSWORD) {
                localStorage.setItem(STORAGE_KEY, 'true');
                showDashboard();
            } else {
                document.getElementById('gate-error').style.display = 'block';
            }
            return false;
        }

        function showDashboard() {
            document.getElementById('password-gate').classList.add('hidden');
            document.getElementById('root').classList.remove('hidden');
        }

        if (localStorage.getItem(STORAGE_KEY) === 'true') {
            showDashboard();
        }
    </script>
